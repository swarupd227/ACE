# Nous RCM Studio — single-origin gateway.
# One host serves the landing + both module SPAs, and reverse-proxies each
# module's API to its backend service on the compose network.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Landing (module chooser) ---
    location = / {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files /index.html =404;
    }

    # ======================= Coding module (ACE) =======================
    # API first (longer prefix wins): /coding/api/x -> ace-api /api/x
    location /coding/api/ {
        proxy_pass http://ace-api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        client_max_body_size 24m;
        # Server-Sent Events (agent console): stream immediately, never buffer.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
    }
    # index.html must never be cached (names the hashed bundle); assets are immutable.
    location = /coding/index.html { add_header Cache-Control "no-cache, must-revalidate"; }
    location /coding/assets/ { add_header Cache-Control "public, max-age=31536000, immutable"; }
    # Static SPA + client-side routing fallback.
    location /coding/ {
        try_files $uri $uri/ /coding/index.html;
    }

    # ======================= Policy module (P2R) =======================
    # API first: /policy/api/x -> p2r-api /x  (P2R routes live at root)
    location /policy/api/ {
        proxy_pass http://p2r-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        client_max_body_size 24m;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
    }
    location = /policy/index.html { add_header Cache-Control "no-cache, must-revalidate"; }
    location /policy/assets/ { add_header Cache-Control "public, max-age=31536000, immutable"; }
    location /policy/ {
        try_files $uri $uri/ /policy/index.html;
    }
}
