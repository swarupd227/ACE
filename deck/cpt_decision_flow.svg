<svg viewBox="0 0 900 1080" width="900" height="1080" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
<defs>
<marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5F5E5A"/></marker>
<marker id="arc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#D85A30"/></marker>
</defs>
<rect x="0" y="0" width="900" height="1080" fill="#FFFFFF"/>

<rect x="80" y="16" width="460" height="58" rx="4" fill="#F1EFE8" stroke="#5F5E5A"/>
<text x="310" y="40" text-anchor="middle" font-size="14" font-weight="600" fill="#444441">Chart arrives</text>
<text x="310" y="60" text-anchor="middle" font-size="11.5" fill="#5F5E5A">note, scan, or EHR feed</text>
<line x1="310" y1="74" x2="310" y2="102" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ar)"/>

<rect x="80" y="104" width="460" height="58" rx="4" fill="#EEEDFE" stroke="#534AB7"/>
<text x="310" y="128" text-anchor="middle" font-size="14" font-weight="600" fill="#3C3489">Stage 0 · codability check</text>
<text x="310" y="148" text-anchor="middle" font-size="11.5" fill="#534AB7">right docs, specialty, exclusions</text>
<line x1="310" y1="162" x2="310" y2="190" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ar)"/>

<rect x="80" y="192" width="460" height="58" rx="4" fill="#EEEDFE" stroke="#534AB7"/>
<text x="310" y="216" text-anchor="middle" font-size="14" font-weight="600" fill="#3C3489">Privacy guard</text>
<text x="310" y="236" text-anchor="middle" font-size="11.5" fill="#534AB7">identifiers masked, age kept</text>
<line x1="310" y1="250" x2="310" y2="278" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ar)"/>

<rect x="80" y="280" width="460" height="58" rx="4" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="310" y="304" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">Read and extract</text>
<text x="310" y="324" text-anchor="middle" font-size="11.5" fill="#0F6E56">anatomy, views, contrast, MDM</text>
<line x1="310" y1="338" x2="310" y2="366" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ar)"/>

<rect x="80" y="368" width="460" height="58" rx="4" fill="#EEEDFE" stroke="#534AB7"/>
<text x="310" y="392" text-anchor="middle" font-size="14" font-weight="600" fill="#3C3489">Grounded shortlist (Graph-RAG)</text>
<text x="310" y="412" text-anchor="middle" font-size="11.5" fill="#534AB7">only retrieved codes allowed</text>
<line x1="310" y1="426" x2="310" y2="454" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ar)"/>

<rect x="80" y="456" width="460" height="58" rx="4" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="310" y="480" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">Model selects codes</text>
<text x="310" y="500" text-anchor="middle" font-size="11.5" fill="#0F6E56">cites chart lines + guideline</text>
<line x1="310" y1="514" x2="310" y2="542" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ar)"/>

<rect x="80" y="544" width="460" height="58" rx="4" fill="#EEEDFE" stroke="#534AB7"/>
<text x="310" y="568" text-anchor="middle" font-size="14" font-weight="600" fill="#3C3489">Citation check</text>
<text x="310" y="588" text-anchor="middle" font-size="11.5" fill="#534AB7">uncited candidates rejected</text>
<line x1="310" y1="602" x2="310" y2="630" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ar)"/>

<rect x="80" y="632" width="460" height="58" rx="4" fill="#EEEDFE" stroke="#534AB7"/>
<text x="310" y="656" text-anchor="middle" font-size="14" font-weight="600" fill="#3C3489">Rule-applied modifiers</text>
<text x="310" y="676" text-anchor="middle" font-size="11.5" fill="#534AB7">26 facility read, RT/LT</text>
<line x1="310" y1="690" x2="310" y2="718" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ar)"/>

<rect x="80" y="720" width="460" height="58" rx="4" fill="#EEEDFE" stroke="#534AB7"/>
<text x="310" y="744" text-anchor="middle" font-size="14" font-weight="600" fill="#3C3489">Validation gates</text>
<text x="310" y="764" text-anchor="middle" font-size="11.5" fill="#534AB7">NCCI, MUE, specificity, payer</text>
<line x1="310" y1="778" x2="310" y2="806" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ar)"/>

<rect x="80" y="808" width="460" height="58" rx="4" fill="#F1EFE8" stroke="#5F5E5A"/>
<text x="310" y="832" text-anchor="middle" font-size="14" font-weight="600" fill="#444441">Blended confidence</text>
<text x="310" y="852" text-anchor="middle" font-size="11.5" fill="#5F5E5A">model, citations, rules, history</text>

<rect x="630" y="104" width="220" height="674" rx="4" fill="#FAECE7" stroke="#993C1D"/>
<text x="740" y="420" text-anchor="middle" font-size="14" font-weight="600" fill="#712B13">Held for human review</text>
<text x="740" y="442" text-anchor="middle" font-size="11.5" fill="#993C1D">every hold carries its reason</text>
<line x1="540" y1="133" x2="624" y2="133" stroke="#D85A30" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arc)"/>
<text x="582" y="125" text-anchor="middle" font-size="11.5" fill="#993C1D">ineligible</text>
<line x1="540" y1="573" x2="624" y2="573" stroke="#D85A30" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arc)"/>
<text x="582" y="565" text-anchor="middle" font-size="11.5" fill="#993C1D">no citation</text>
<line x1="540" y1="749" x2="624" y2="749" stroke="#D85A30" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arc)"/>
<text x="582" y="741" text-anchor="middle" font-size="11.5" fill="#993C1D">gate fails</text>

<line x1="160" y1="866" x2="160" y2="924" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="310" y1="866" x2="310" y2="924" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="460" y1="866" x2="460" y2="924" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="740" y1="778" x2="545" y2="948" stroke="#D85A30" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arc)"/>

<text x="160" y="916" text-anchor="middle" font-size="11.5" fill="#5F5E5A">high</text>
<text x="310" y="916" text-anchor="middle" font-size="11.5" fill="#5F5E5A">medium</text>
<text x="478" y="916" text-anchor="middle" font-size="11.5" fill="#5F5E5A">low / hard stop</text>

<rect x="80" y="926" width="160" height="64" rx="4" fill="#EAF3DE" stroke="#3B6D11"/>
<text x="160" y="952" text-anchor="middle" font-size="14" font-weight="600" fill="#27500A">Straight-through</text>
<text x="160" y="972" text-anchor="middle" font-size="11.5" fill="#3B6D11">auto-bill, audit-sampled</text>
<rect x="250" y="926" width="160" height="64" rx="4" fill="#FAEEDA" stroke="#854F0B"/>
<text x="330" y="952" text-anchor="middle" font-size="14" font-weight="600" fill="#633806">QA review</text>
<text x="330" y="972" text-anchor="middle" font-size="11.5" fill="#854F0B">auditor confirms draft</text>
<rect x="420" y="926" width="160" height="64" rx="4" fill="#FAECE7" stroke="#993C1D"/>
<text x="500" y="952" text-anchor="middle" font-size="14" font-weight="600" fill="#712B13">Manual coder</text>
<text x="500" y="972" text-anchor="middle" font-size="11.5" fill="#993C1D">AI gives a head start</text>

<rect x="80" y="1024" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="102" y="1036" font-size="11.5" fill="#444441">AI reasoning step</text>
<rect x="240" y="1024" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#534AB7"/>
<text x="262" y="1036" font-size="11.5" fill="#444441">deterministic rule step</text>
<rect x="440" y="1024" width="14" height="14" rx="3" fill="#FAECE7" stroke="#993C1D"/>
<text x="462" y="1036" font-size="11.5" fill="#444441">human review path</text>
</svg>
