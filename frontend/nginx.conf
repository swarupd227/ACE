server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing. index.html must never be cached (it names the hashed bundle);
    # the hashed assets themselves are immutable and can be cached forever. This
    # removes the need to hard-refresh after every redeploy.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend service on the compose network.
    location /api/ {
        # Scanned-chart uploads (PDF/images) exceed the 1 MB nginx default.
        client_max_body_size 12m;
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        # Server-Sent Events: stream immediately, don't buffer.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
    }
}
